        :root { --primary: #ff4500; --secondary: #1a1a2e; --accent: #00d4ff; --bg: #0a0a0f; --text: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); line-height: 1.6; }
        header { background: linear-gradient(135deg, var(--secondary), #2d1f3d); padding: 2rem; text-align: center; border-bottom: 3px solid var(--primary); }
        h1 { font-size: 2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; }
        .subtitle { color: var(--accent); margin-top: 0.5rem; }
        nav { background: var(--secondary); padding: 1rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        nav a { color: var(--text); text-decoration: none; padding: 0.5rem 1rem; border: 1px solid var(--accent); transition: all 0.3s; }
        nav a:hover { background: var(--accent); color: var(--bg); }
        main { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .controls { background: var(--secondary); padding: 1rem; margin-bottom: 2rem; border: 1px solid var(--primary); border-radius: 4px; }
        .controls input, .controls select { background: var(--bg); color: var(--text); border: 1px solid var(--accent); padding: 0.5rem; margin: 0.25rem; border-radius: 4px; }
        .controls input { width: 200px; }
        .controls select { min-width: 150px; }
        .stats-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; color: var(--accent); font-size: 0.9rem; }
        .table-container { overflow-x: auto; max-height: 80vh; }
        table { width: 100%; border-collapse: collapse; background: var(--secondary); }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #333; }
        th { background: var(--primary); color: var(--bg); font-weight: bold; position: sticky; top: 0; z-index: 10; }
        tr:hover { background: #252540; }
        .name-cell a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .name-cell a:hover { text-decoration: underline; }
        .bio-link { color: #4CAF50; font-size: 0.75rem; text-decoration: none; margin-left: 0.5rem; }
        .bio-link:hover { text-decoration: underline; }
        .no-bio { color: #666; font-size: 0.75rem; }
        .nationality { font-size: 0.85rem; }
        .era { color: var(--primary); font-size: 0.85rem; }
        .notes { font-size: 0.8rem; color: #aaa; max-width: 350px; }
        .contribution { font-size: 0.85rem; }
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; flex-wrap: wrap; }
        .pagination button { background: var(--secondary); color: var(--text); border: 1px solid var(--accent); padding: 0.5rem 1rem; cursor: pointer; transition: all 0.3s; border-radius: 4px; }
        .pagination button:hover, .pagination button.active { background: var(--accent); color: var(--bg); }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        footer { background: var(--secondary); padding: 2rem; text-align: center; margin-top: 3rem; border-top: 3px solid var(--primary); }
        .back-link { color: var(--accent); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        @media (max-width: 768px) { th, td { padding: 0.5rem; font-size: 0.8rem; } .notes { max-width: 150px; } }
    </style>

        let filteredData = [...database];
        let currentPage = 1;
        let perPage = 30;
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageData = filteredData.slice(start, end);
            
            tbody.innerHTML = pageData.map((e, i) => `
                <tr>
                    <td>${start + i + 1}</td>
                    <td class="name-cell">${e.bioFile ? `<a href="https://github.com/Thompson420/gonzo-journalism/blob/master/docs/${e.bioFile}" target="_blank">${e.name}</a>` : e.name}</td>
                    <td class="nationality">${e.nationality}</td>
                    <td class="era">${e.era}</td>
                    <td class="contribution">${e.contribution}</td>
                    <td class="notes">${e.notes}</td>
                </tr>
            `).join('');
            
            document.getElementById('totalCount').textContent = `Showing ${filteredData.length} journalists`;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${Math.ceil(filteredData.length / perPage)}`;
            
            renderPagination();
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const pagination = document.getElementById('pagination');
            let html = '';
            
            html += `<button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>« First</button>`;
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹ Prev</button>`;
            
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next ›</button>`;
            html += `<button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Last »</button>`;
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const totalPages = Math.ceil(filteredData.length / perPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
            }
        }
        
        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const nationality = document.getElementById('nationalityFilter').value;
            const era = document.getElementById('eraFilter').value;
            
            filteredData = database.filter(e => {
                const matchSearch = e.name.toLowerCase().includes(search) || 
                                    e.notes.toLowerCase().includes(search) ||
                                    e.contribution.toLowerCase().includes(search);
                const matchNat = !nationality || e.nationality === nationality;
                const matchEra = !era || e.era === era;
                return matchSearch && matchNat && matchEra;
            });
            
            currentPage = 1;
            renderTable();
        }
        
        function changePerPage() {
            perPage = parseInt(document.getElementById('perPageSelect').value);
            currentPage = 1;
            renderTable();
        }
        
        // Initial render
        renderTable();
    </script>
